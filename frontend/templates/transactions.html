{% extends "base.html" %}

{% block title %}Transactions - Div-API Portfolio{% endblock %}
{% block page_heading %}Transactions{% endblock %}

{% block content %}
<div id="dashboard-content" style="display: none;">

    <!-- Account Selection Area -->
    <div class="card mb-2">
        <div class="card-header flex-between">
            <h2>Your Accounts</h2>
            <button id="btn-new-account" class="btn btn-primary btn-sm">+ New Account</button>
        </div>
        <div class="card-body">
            <select id="account-select" class="form-control">
                <option value="">Select an account...</option>
            </select>
        </div>
    </div>

    <!-- Transactions Panel -->
    <div class="card" id="transactions-panel" style="display: none;">
        <div class="card-header flex-between">
            <h2>Transactions</h2>
            <button id="btn-new-transaction" class="btn btn-secondary btn-sm">+ Track</button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table" id="transactions-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Symbol</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- New Account Modal -->
<div id="modal-account" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>Create New Account</h2>
        <form id="form-account">
            <div class="form-group">
                <label>Account Name</label>
                <input type="text" id="input-account-name" required>
            </div>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
    </div>
</div>

<!-- New Transaction Modal -->
<div id="modal-transaction" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>Record Transaction</h2>
        <form id="form-transaction">
            <div class="form-group">
                <label>Type</label>
                <select id="input-tx-type" class="form-control" required>
                    <option value="BUY">BUY</option>
                    <option value="SELL">SELL</option>
                </select>
            </div>
            <div class="form-group">
                <label>Symbol</label>
                <input type="text" id="input-tx-symbol" required style="text-transform: uppercase">
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="input-tx-date" required>
            </div>
            <div class="form-group row">
                <div class="col">
                    <label>Quantity</label>
                    <input type="number" id="input-tx-quantity" min="1" required>
                </div>
                <div class="col">
                    <label>Price</label>
                    <input type="number" id="input-tx-price" step="0.01" min="0.01" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Save Transaction</button>
        </form>
    </div>
</div>

{% endblock %}
